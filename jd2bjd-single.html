<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD → BJD Converter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
        }
        h1 { text-align: center; margin-bottom: 10px; color: #00d4ff; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; }
        input, select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: #fff; font-size: 16px;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer;
        }
        .result {
            margin-top: 30px; padding: 20px; background: rgba(0,212,255,0.1);
            border-radius: 12px; display: none;
        }
        .result.show { display: block; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .result-label { color: #aaa; }
        .result-value { color: #00d4ff; font-family: monospace; font-size: 18px; }
        .info { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔭 JD → BJD Converter</h1>
        <p class="subtitle">Julian Date (JD) → Barycentric Julian Date (BJD-TDB)</p>
        
        <div class="row">
            <div class="form-group">
                <label>JD (Julian Date)</label>
                <input type="number" id="jd" placeholder="e.g., 2460000.5" step="0.0001">
            </div>
            <div class="form-group">
                <label>Observatory</label>
                <select id="observatory">
                    <option value="shanghai">Shanghai Observatory</option>
                    <option value="mauna_kea">Mauna Kea (Hawaii)</option>
                    <option value="paranal">Paranal (Chile)</option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Right Ascension RA (degrees)</label>
                <input type="number" id="ra" value="83.633" step="0.001">
            </div>
            <div class="form-group">
                <label>Declination Dec (degrees)</label>
                <input type="number" id="dec" value="-5.391" step="0.001">
            </div>
        </div>
        
        <button class="btn" onclick="convert()">Convert</button>
        
        <div class="result" id="result">
            <div class="result-item"><span class="result-label">Input JD</span><span class="result-value" id="res-jd"></span></div>
            <div class="result-item"><span class="result-label">BJD-TDB</span><span class="result-value" id="res-bjd"></span></div>
            <div class="result-item"><span class="result-label">LTT Correction (seconds)</span><span class="result-value" id="res-ltt"></span></div>
        </div>
        
        <div class="info">
            <p>⚠️ This is a simplified version using approximate calculations</p>
            <p>For precision, use Python + Astropy</p>
        </div>
    </div>
    
    <script>
    // Simplified version: approximate calculation only (no Astropy)
    const JD_J2000 = 2451545.0;
    const DEG2RAD = Math.PI / 180;
    
    // Observatory approximate coordinates (degrees)
    const OBS = {
        shanghai: {lon: 121.54, lat: 31.22},
        mauna_kea: {lon: -155.48, lat: 19.82},
        paranal: {lon: -70.40, lat: -24.63}
    };
    
    function convert() {
        const jd = parseFloat(document.getElementById('jd').value);
        const ra = parseFloat(document.getElementById('ra').value) * DEG2RAD;
        const dec = parseFloat(document.getElementById('dec').value) * DEG2RAD;
        const obsName = document.getElementById('observatory').value;
        
        if (!jd) { alert('Please enter JD'); return; }
        
        const obs = OBS[obsName];
        const obsLon = obs.lon * DEG2RAD;
        const obsLat = obs.lat * DEG2RAD;
        
        // Calculate Julian centuries
        const T = (jd - JD_J2000) / 36525;
        
        // Earth orbital parameters (approximate)
        const L0 = 280.46646 + 36000.76983 * T;  // Mean longitude
        const M = 357.52911 + 35999.05029 * T;   // Mean anomaly
        const e = 0.016708634 - 0.000042037 * T; // Eccentricity
        
        // Sun's geometric mean longitude
        const omega = 125.04 - 1934.136 * T;
        const L = L0 - 1.914666 * Math.sin(M*DEG2RAD) - 0.019994 * Math.sin(2*M*DEG2RAD);
        
        // Earth position in ecliptic coordinates (AU)
        const v = M + (2*e - 0.25*e*e*e) * Math.sin(M*DEG2RAD);
        const r = 1.000001018 * (1 - e*e) / (1 + e*Math.cos(v*DEG2RAD));
        
        // Convert to equatorial coordinates
        const eps = (23.439291 - 0.0130042 * T) * DEG2RAD; // Obliquity
        const x_earth = r * Math.cos(L*DEG2RAD);
        const y_earth = r * Math.sin(L*DEG2RAD) * Math.cos(eps);
        
        // Calculate light-travel time correction (approximate)
        // LTT = (R·S) / c, where R is Earth position, S is target direction
        const cos_ra = Math.cos(ra);
        const ltt_days = (x_earth * cos_ra * Math.cos(dec) + y_earth * Math.sin(dec)) / 173.14463267;
        
        // BJD ≈ JD + LTT (simplified)
        const bjd = jd + ltt_days;
        
        // Display results
        document.getElementById('res-jd').textContent = jd.toFixed(6);
        document.getElementById('res-bjd').textContent = bjd.toFixed(6);
        document.getElementById('res-ltt').textContent = (ltt_days * 86400).toFixed(3) + " sec";
        
        document.getElementById('result').classList.add('show');
    }
    
    // Default to current time
    document.getElementById('jd').value = Math.floor(Date.now()/86400000 + 2440587.5);
    </script>
</body>
</html>
